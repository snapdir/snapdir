# cargo-deny configuration for the snapdir-rs workspace.
# Run with: cargo deny --workspace --all-features check
#
# Policy goals:
#   * MIT project — only permissive licenses allowed.
#   * Standardize on the `ring` rustls crypto provider; `aws-lc-rs` must NOT
#     sneak in (it breaks the static-musl build). Banned below.
#   * No security advisories; vetted crate sources only (crates.io).

[graph]
all-features = true

[advisories]
version = 2
# Fail on any reported advisory by default. Add specific RUSTSEC ids here only
# with a justification comment if/when an unavoidable transitive dep needs it.
ignore = [
    # bincode 1.3.3 "unmaintained" — NOT a vulnerability. The bincode team has
    # declared 1.3.3 the final, complete release with no further updates and no
    # safe upgrade. It enters the tree ONLY as a transitive dev-dependency of
    # `iai-callgrind 0.16.1` (the bench instruction-count perf tooling), is never
    # shipped in any published crate or the CLI binary, and has no fix available.
    "RUSTSEC-2025-0141",
    # proc-macro-error2 2.0.1 "unmaintained" — NOT a vulnerability (the author
    # confirmed it's no longer maintained; "No safe upgrade is available"). Same
    # situation/origin as the bincode entry above: it enters the tree ONLY as a
    # transitive dev-dependency via `iai-callgrind-macros -> iai-callgrind 0.16.1`
    # (the bench perf tooling), and is never shipped in any published crate or the
    # CLI binary.
    "RUSTSEC-2026-0173",
    # anyhow — unsoundness in Error::downcast_mut() when called on a context-wrapped
    # error. The affected code path (.context(...) followed by downcast_mut() on the
    # returned anyhow::Error) is NOT exercised anywhere in this workspace: `grep -rn
    # "downcast_mut"` returns zero hits across all crates. Furthermore, anyhow is
    # declared only in snapdir-cli (a binary), not in any published library crate, so
    # downstream consumers are not at risk. Drop this ignore once anyhow ships a
    # patched release that addresses RUSTSEC-2026-0190.
    "RUSTSEC-2026-0190",
    # pyo3 0.23 — PyString::from_object does not null-terminate the &str argument
    # before passing it to the Python C API, risking an out-of-bounds read. The
    # snapdir-python binding does NOT call PyString::from_object; all string
    # conversions use .extract::<String>(), .into_pyobject(), and the standard
    # PyO3 derive macros — none of which route through the affected function.
    # Drop this ignore once the binding is upgraded to pyo3 >=0.24.1 (subject to
    # the ≥3-day dependency-cooldown policy).
    "RUSTSEC-2025-0020",
    # pyo3 0.23 — PyCFunction::new_closure misses a Sync bound, permitting data
    # races when the closure is invoked concurrently from Python threads. The
    # snapdir-python binding does NOT call PyCFunction::new_closure; async
    # functions are exposed via #[pyfunction] + wrap_pyfunction! + future_into_py,
    # which go through a different code path unaffected by this advisory.
    # Drop this ignore once the binding is upgraded to pyo3 >=0.29.0 (subject to
    # the ≥3-day dependency-cooldown policy).
    "RUSTSEC-2026-0177",
]

[licenses]
version = 2
# Permissive licenses compatible with this MIT project.
allow = [
    "MIT",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "ISC",
    "Unicode-3.0",
    "Unicode-DFS-2016",
    "Zlib",
    "CC0-1.0",
    "MPL-2.0",
    # License of `webpki-root-certs` (a Mozilla CA-trust-roots *data* crate,
    # pulled transitively via rustls-platform-verifier <- reqwest <-
    # google-cloud-auth). CDLA-Permissive-2.0 is a permissive data license,
    # appropriate for an MIT project shipping CA trust anchors.
    "CDLA-Permissive-2.0",
]
confidence-threshold = 0.9

[bans]
multiple-versions = "warn"
wildcards = "deny"
# Allowed default duplicate-version skips can be added here as the dep graph grows.
allow = []

# Hard-ban aws-lc-rs (and its sys crate): the workspace uses the ring rustls
# provider so the static musl target links cleanly. If a dependency tries to
# pull aws-lc-rs in via a default feature, this turns it into a build failure
# instead of a silent musl breakage.
deny = [
    { name = "aws-lc-rs" },
    { name = "aws-lc-sys" },
    { name = "openssl-sys" },
]

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
