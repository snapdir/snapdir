name: Release

# Rust-port release pipeline. Triggered by semver tags (v*). Builds the
# `snapdir` binary for every distribution target (incl. static musl), generates
# shell completions + a man page, packs per-target archives with checksums,
# attaches them to the GitHub release, builds a slim scratch/distroless
# musl-static Docker image, and publishes the library crates to crates.io.
#
# Packaging config of record: packaging/dist-workspace.toml (cargo-dist). This
# workflow is the hand-rolled matrix that implements the same plan with full
# control over the cross/musl/completions/man/docker/crates.io steps.
#
# DRY RUN (no publishing): build + smoke every target (incl. musl static),
# producing the archives/checksums WITHOUT touching the GitHub release, GHCR, or
# crates.io. The publish jobs (release/docker/crates-io) are hard-gated on a real
# `v*` TAG PUSH (`github.event_name == 'push'`), so a manual run can never publish
# regardless of the `dry_run` input value.
#   - GitHub UI: Actions -> Release -> Run workflow -> branch `main`,
#     leave `dry_run: true`.
#   - CLI:       gh workflow run release.yml --ref main -f dry_run=true
# A real publish still happens ONLY by pushing a semver tag (e.g. `git tag v0.5.0
# && git push origin v0.5.0`).

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Build + smoke all targets WITHOUT publishing (no GitHub release, no GHCR, no crates.io)"
        type: boolean
        default: true

permissions:
  contents: write   # create the GitHub release + upload assets
  packages: write   # push the container image to GHCR

env:
  CARGO_TERM_COLOR: always
  BIN_NAME: snapdir
  CLI_CRATE: snapdir-cli
  CARGO_PROFILE: dist

jobs:
  # ---------------------------------------------------------------------------
  # 1. Generate shell completions + man page once, share with every archive.
  #
  #    These are GENERATED from the snapdir-cli crate. They require a generation
  #    entry point in the CLI: a hidden `completions <shell>` / `man` subcommand
  #    (clap_complete + clap_mangen). See the BLOCKER note below — if that hook
  #    is missing this job fails loudly rather than shipping empty assets.
  # ---------------------------------------------------------------------------
  gen-assets:
    name: Generate completions + man page
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          key: gen-assets

      - name: Generate shell completions (bash/fish/zsh/powershell)
        run: |
          set -euo pipefail
          mkdir -p assets/completions assets/man
          for shell in bash fish zsh powershell; do
            cargo run --locked -p "${CLI_CRATE}" -- completions "${shell}" \
              > "assets/completions/snapdir.${shell}"
          done

      - name: Generate man page (clap_mangen)
        run: |
          set -euo pipefail
          cargo run --locked -p "${CLI_CRATE}" -- man > assets/man/snapdir.1

      - name: Upload generated assets
        uses: actions/upload-artifact@v4
        with:
          name: snapdir-assets
          path: assets/
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # 2. Per-target build matrix. Native runners for macOS/linux-gnu;
  #    `cross` for the musl-static and aarch64 legs so they link hermetically.
  # ---------------------------------------------------------------------------
  build:
    name: Build ${{ matrix.target }}
    needs: gen-assets
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            cross: false
            archive: tar.xz
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            cross: true
            archive: tar.xz
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            cross: true
            archive: tar.xz
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            cross: true
            archive: tar.xz
          - target: x86_64-apple-darwin
            os: macos-15-intel
            cross: false
            archive: tar.xz
          - target: aarch64-apple-darwin
            os: macos-14
            cross: false
            archive: tar.xz
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.cross
        run: cargo install cross --locked --version 0.2.5

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          key: build-${{ matrix.target }}

      - name: Download generated assets
        uses: actions/download-artifact@v4
        with:
          name: snapdir-assets
          path: assets

      - name: Build (cross)
        if: matrix.cross
        run: |
          cross build --locked --profile "${CARGO_PROFILE}" \
            -p "${CLI_CRATE}" --bin "${BIN_NAME}" \
            --target "${{ matrix.target }}"

      - name: Build (native)
        if: ${{ !matrix.cross }}
        shell: bash
        run: |
          cargo build --locked --profile "${CARGO_PROFILE}" \
            -p "${CLI_CRATE}" --bin "${BIN_NAME}" \
            --target "${{ matrix.target }}"

      - name: Stage archive contents
        id: stage
        shell: bash
        run: |
          set -euo pipefail
          # On a workflow_dispatch dry-run GITHUB_REF_NAME is a branch (not a
          # `v*` tag), so stamp a safe placeholder version instead.
          version="${GITHUB_REF_NAME#v}"
          if [ "${{ github.event_name }}" != "push" ]; then
            version="0.0.0-dryrun"
          fi
          name="${BIN_NAME}-${version}-${{ matrix.target }}"
          mkdir -p "dist/${name}"

          cp "target/${{ matrix.target }}/${CARGO_PROFILE}/${BIN_NAME}" "dist/${name}/"

          cp README.md LICENSE "dist/${name}/"
          cp docs/rust-port/CHANGELOG.md "dist/${name}/CHANGELOG.md"
          cp docs/rust-port/migration.md "dist/${name}/migration.md"
          cp -r assets/completions "dist/${name}/completions"
          mkdir -p "dist/${name}/man"
          cp assets/man/snapdir.1 "dist/${name}/man/"

          echo "name=${name}" >> "$GITHUB_OUTPUT"

      - name: Create archive (tar.xz)
        if: ${{ matrix.archive == 'tar.xz' }}
        shell: bash
        run: |
          set -euo pipefail
          name="${{ steps.stage.outputs.name }}"
          tar -C dist -cJf "dist/${name}.tar.xz" "${name}"
          ( cd dist && shasum -a 256 "${name}.tar.xz" > "${name}.tar.xz.sha256" )

      - name: Upload target archive
        uses: actions/upload-artifact@v4
        with:
          name: archive-${{ matrix.target }}
          path: |
            dist/*.tar.xz
            dist/*.tar.xz.sha256
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # 3. Publish the GitHub release with every per-target archive + checksum.
  # ---------------------------------------------------------------------------
  release:
    name: Publish GitHub release
    needs: build
    # Publish ONLY on a real `v*` tag push; a workflow_dispatch dry-run stops here.
    if: ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') }}
    runs-on: ubuntu-latest
    permissions:
      contents: write      # create the GitHub release + upload assets
      id-token: write      # Sigstore OIDC for build-provenance attestations
      attestations: write  # write SLSA build-provenance attestations
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all archives
        uses: actions/download-artifact@v4
        with:
          pattern: archive-*
          merge-multiple: true
          path: dist

      - name: Aggregate checksums
        run: |
          set -euo pipefail
          ( cd dist && cat ./*.sha256 > SHA256SUMS )

      # SLSA build-provenance attestations (Sigstore-backed) for every release
      # archive. Verify later with:
      #   gh attestation verify <file> --repo snapdir/snapdir
      - name: Attest build provenance (release archives)
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: 'dist/*.tar.xz'

      - name: Create / update GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body_path: docs/rust-port/CHANGELOG.md
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            dist/*.tar.xz
            dist/*.sha256
            dist/SHA256SUMS
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ---------------------------------------------------------------------------
  # 4. Slim scratch/distroless musl-static Docker image (replaces the old
  #    ~8 MB Alpine+Bash image). Reuses the musl archive from the build matrix.
  # ---------------------------------------------------------------------------
  docker:
    name: Build & push Docker image
    needs: build
    # Publish ONLY on a real `v*` tag push; a workflow_dispatch dry-run stops here.
    if: ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') }}
    runs-on: ubuntu-latest
    permissions:
      contents: read       # checkout
      packages: write      # push the image to GHCR
      id-token: write      # cosign keyless signing + Sigstore OIDC
      attestations: write  # write image build-provenance attestation
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download musl archive
        uses: actions/download-artifact@v4
        with:
          name: archive-x86_64-unknown-linux-musl
          path: dist

      - name: Extract static binary
        run: |
          set -euo pipefail
          version="${GITHUB_REF_NAME#v}"
          archive="dist/${BIN_NAME}-${version}-x86_64-unknown-linux-musl.tar.xz"
          tar -C dist -xJf "${archive}"
          # Stage outside target/ — the repo .dockerignore excludes target/ (kept small
          # for the from-source root Dockerfile), which would otherwise hide the binary
          # from the packaging/Dockerfile COPY.
          mkdir -p release-bin
          cp "dist/${BIN_NAME}-${version}-x86_64-unknown-linux-musl/${BIN_NAME}" \
            release-bin/snapdir

      - name: Docker meta
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: |
            ghcr.io/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push (scratch, static musl)
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          file: packaging/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            BIN=release-bin/snapdir

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      # Keyless (OIDC) signature on the pushed image, by digest (not tag).
      # The signing cert identity is this workflow:
      #   https://github.com/snapdir/snapdir/.github/workflows/release.yml@refs/tags/v*
      - name: Sign image (cosign keyless)
        run: cosign sign --yes "ghcr.io/${{ github.repository }}@${{ steps.build.outputs.digest }}"

      - name: Attest build provenance (image)
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ghcr.io/${{ github.repository }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true

  # ---------------------------------------------------------------------------
  # 5. Publish library crates to crates.io (core -> catalog/stores -> cli).
  #    Order respects the internal dependency graph. The CLI binary is shipped
  #    via the archives above; publishing it is optional and kept last.
  # ---------------------------------------------------------------------------
  # Trusted Publishing — register the publisher on crates.io for each crate
  # (snapdir-core/-catalog/-stores/-cli): crate Settings -> Trusted Publishing ->
  # GitHub -> repo `snapdir/snapdir`, workflow `release.yml`. No stored token
  # needed once registered.
  crates-io:
    name: Publish crates.io
    needs: release
    # Publish ONLY on a real `v*` tag push; a workflow_dispatch dry-run stops here.
    if: ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') }}
    runs-on: ubuntu-latest
    permissions:
      contents: read   # checkout
      id-token: write  # OIDC exchange for a short-lived crates.io token
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Authenticate to crates.io (Trusted Publishing)
        id: auth
        uses: rust-lang/crates-io-auth-action@v1

      - name: Publish in dependency order
        run: |
          set -euo pipefail
          for crate in snapdir-core snapdir-catalog snapdir-stores snapdir-cli; do
            echo "::group::publish ${crate}"
            cargo publish --locked -p "${crate}" --no-verify
            echo "::endgroup::"
          done
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
