name: Release

# Rust-port release pipeline. Triggered by semver tags (v*). Builds the
# `snapdir` binary plus the `snapdir-ssh-store`/`snapdir-sftp-store` helper
# bins for every distribution target (incl. static musl), generates shell
# completions + a man page, packs per-target archives with checksums, attaches
# them to the GitHub release, and publishes the workspace crates to crates.io.
#
# Packaging config of record: packaging/dist-workspace.toml (cargo-dist). This
# workflow is the hand-rolled matrix that implements the same plan with full
# control over the cross/musl/completions/man/crates.io steps.
#
# DRY RUN (no publishing): build + smoke every target (incl. musl static),
# producing the archives/checksums WITHOUT touching the GitHub release or
# crates.io. The publish jobs (release/crates-io) are hard-gated on a real
# `v*` TAG PUSH (`github.event_name == 'push'`), so a manual run can never publish
# regardless of the `dry_run` input value.
#   - GitHub UI: Actions -> Release -> Run workflow -> branch `dev`,
#     leave `dry_run: true`.
#   - CLI:       gh workflow run release.yml --ref dev -f dry_run=true
# A real publish still happens ONLY by pushing a semver tag (e.g. `git tag v0.5.0
# && git push origin v0.5.0`).

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Build + smoke all targets WITHOUT publishing (no GitHub release, no crates.io)"
        type: boolean
        default: true

permissions:
  contents: write   # create the GitHub release + upload assets

env:
  CARGO_TERM_COLOR: always
  BIN_NAME: snapdir
  # Package that OWNS the `snapdir` [[bin]] target. Since the flagship-crate
  # rename this is the `snapdir` shim crate (crates/snapdir); `snapdir-cli` is
  # now the implementation LIBRARY and has no binary.
  BIN_CRATE: snapdir
  # External-store helper bins shipped ALONGSIDE `snapdir` in every archive.
  # Built from crates/snapdir-ssh-store (std + snapdir-core only, so the
  # musl-static legs stay trivially clean).
  SSH_STORE_CRATE: snapdir-ssh-store
  SSH_STORE_BINS: "snapdir-ssh-store snapdir-sftp-store"
  CARGO_PROFILE: dist

jobs:
  # ---------------------------------------------------------------------------
  # 1. Generate shell completions + man page once, share with every archive.
  #
  #    These are GENERATED by running the `snapdir` bin crate (which wraps the
  #    snapdir-cli implementation library). They require a generation
  #    entry point in the CLI: a hidden `completions <shell>` / `man` subcommand
  #    (clap_complete + clap_mangen). See the BLOCKER note below — if that hook
  #    is missing this job fails loudly rather than shipping empty assets.
  # ---------------------------------------------------------------------------
  gen-assets:
    name: Generate completions + man page
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          key: gen-assets

      - name: Generate shell completions (bash/fish/zsh/powershell)
        run: |
          set -euo pipefail
          mkdir -p assets/completions assets/man
          for shell in bash fish zsh powershell; do
            cargo run --locked -p "${BIN_CRATE}" -- completions "${shell}" \
              > "assets/completions/snapdir.${shell}"
          done

      - name: Generate man page (clap_mangen)
        run: |
          set -euo pipefail
          cargo run --locked -p "${BIN_CRATE}" -- man > assets/man/snapdir.1

      - name: Upload generated assets
        uses: actions/upload-artifact@v4
        with:
          name: snapdir-assets
          path: assets/
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # 2. Per-target build matrix. Native runners for macOS/linux-gnu;
  #    `cross` for the musl-static and aarch64 legs so they link hermetically.
  # ---------------------------------------------------------------------------
  build:
    name: Build ${{ matrix.target }}
    needs: gen-assets
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
            cross: false
            archive: tar.xz
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            cross: true
            archive: tar.xz
          - target: aarch64-unknown-linux-gnu
            os: ubuntu-latest
            cross: true
            archive: tar.xz
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            cross: true
            archive: tar.xz
          - target: x86_64-apple-darwin
            os: macos-15-intel
            cross: false
            archive: tar.xz
          - target: aarch64-apple-darwin
            os: macos-14
            cross: false
            archive: tar.xz
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Install cross
        if: matrix.cross
        run: cargo install cross --locked --version 0.2.5

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          key: build-${{ matrix.target }}

      - name: Download generated assets
        uses: actions/download-artifact@v4
        with:
          name: snapdir-assets
          path: assets

      - name: Build (cross)
        if: matrix.cross
        run: |
          cross build --locked --profile "${CARGO_PROFILE}" \
            -p "${BIN_CRATE}" -p "${SSH_STORE_CRATE}" --bins \
            --target "${{ matrix.target }}"

      - name: Build (native)
        if: ${{ !matrix.cross }}
        shell: bash
        run: |
          cargo build --locked --profile "${CARGO_PROFILE}" \
            -p "${BIN_CRATE}" -p "${SSH_STORE_CRATE}" --bins \
            --target "${{ matrix.target }}"

      - name: Stage archive contents
        id: stage
        shell: bash
        run: |
          set -euo pipefail
          # On a workflow_dispatch dry-run GITHUB_REF_NAME is a branch (not a
          # `v*` tag), so stamp a safe placeholder version instead.
          version="${GITHUB_REF_NAME#v}"
          if [ "${{ github.event_name }}" != "push" ]; then
            version="0.0.0-dryrun"
          fi
          name="${BIN_NAME}-${version}-${{ matrix.target }}"
          mkdir -p "dist/${name}"

          cp "target/${{ matrix.target }}/${CARGO_PROFILE}/${BIN_NAME}" "dist/${name}/"
          # External-store helper bins ride in the same per-target archive.
          for bin in ${SSH_STORE_BINS}; do
            cp "target/${{ matrix.target }}/${CARGO_PROFILE}/${bin}" "dist/${name}/"
          done

          cp README.md LICENSE "dist/${name}/"
          cp docs/rust-port/CHANGELOG.md "dist/${name}/CHANGELOG.md"
          cp docs/rust-port/migration.md "dist/${name}/migration.md"
          cp -r assets/completions "dist/${name}/completions"
          mkdir -p "dist/${name}/man"
          cp assets/man/snapdir.1 "dist/${name}/man/"

          echo "name=${name}" >> "$GITHUB_OUTPUT"

      - name: Create archive (tar.xz)
        if: ${{ matrix.archive == 'tar.xz' }}
        shell: bash
        run: |
          set -euo pipefail
          name="${{ steps.stage.outputs.name }}"
          tar -C dist -cJf "dist/${name}.tar.xz" "${name}"
          ( cd dist && shasum -a 256 "${name}.tar.xz" > "${name}.tar.xz.sha256" )

      - name: Upload target archive
        uses: actions/upload-artifact@v4
        with:
          name: archive-${{ matrix.target }}
          path: |
            dist/*.tar.xz
            dist/*.tar.xz.sha256
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # 3. Publish the GitHub release with every per-target archive + checksum.
  # ---------------------------------------------------------------------------
  release:
    name: Publish GitHub release
    needs: build
    # Publish ONLY on a real `v*` tag push; a workflow_dispatch dry-run stops here.
    if: ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') }}
    runs-on: ubuntu-latest
    permissions:
      contents: write      # create the GitHub release + upload assets
      id-token: write      # Sigstore OIDC for build-provenance attestations
      attestations: write  # write SLSA build-provenance attestations
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download all archives
        uses: actions/download-artifact@v4
        with:
          pattern: archive-*
          merge-multiple: true
          path: dist

      - name: Aggregate checksums
        run: |
          set -euo pipefail
          ( cd dist && cat ./*.sha256 > SHA256SUMS )

      # SLSA build-provenance attestations (Sigstore-backed) for every release
      # archive. Verify later with:
      #   gh attestation verify <file> --repo snapdir/snapdir
      - name: Attest build provenance (release archives)
        uses: actions/attest-build-provenance@v2
        with:
          subject-path: 'dist/*.tar.xz'

      - name: Create / update GitHub release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          body_path: docs/rust-port/CHANGELOG.md
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: |
            dist/*.tar.xz
            dist/*.sha256
            dist/SHA256SUMS
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ---------------------------------------------------------------------------
  # 4. Publish the workspace crates to crates.io
  #    (core -> catalog -> stores -> ssh-store -> cli -> snapdir).
  #    Order respects the internal dependency graph: `snapdir` (the bin shim)
  #    depends on the `snapdir-cli` implementation library, which depends on
  #    everything else — so `snapdir` publishes LAST.
  # ---------------------------------------------------------------------------
  # Trusted Publishing — register the publisher on crates.io for each crate
  # (snapdir-core/-catalog/-stores/-ssh-store/-cli/snapdir): crate Settings ->
  # Trusted Publishing -> GitHub -> repo `snapdir/snapdir`, workflow
  # `release.yml`. No stored token needed once registered.
  #
  # *** RELEASE-TIME OPERATOR TODO (first release shipping the `snapdir` crate,
  # i.e. v1.6.0) ***
  # `snapdir` is a NEW crate name on crates.io: TP tokens CANNOT create new
  # crates, so this job's first `cargo publish -p snapdir` will fail with a 403
  # (this job authenticates EXCLUSIVELY via the TP OIDC exchange below —
  # crates-io-auth-action — there is no stored-token fallback). Expected
  # operator flow:
  #   1. Let the loop publish the five existing crates (all skip-guarded /
  #      TP-registered) and 403 on `snapdir`.
  #   2. Publish the first `snapdir` version manually with a scoped API token:
  #      `cargo publish -p snapdir --locked --no-verify`.
  #   3. Re-run this workflow — the idempotent skip-guard below skips every
  #      already-published crate@version, so the re-run is safe and turns the
  #      job green.
  #   4. IMMEDIATELY register Trusted Publishing for `snapdir` (crate Settings
  #      -> Trusted Publishing -> GitHub -> repo `snapdir/snapdir`, workflow
  #      `release.yml`) so subsequent releases need no operator step.
  # (Precedent: the same bootstrap was done for snapdir-ssh-store at 1.5.0; TP
  # is now registered for all five previously-published crates.)
  crates-io:
    name: Publish crates.io
    needs: release
    # Publish ONLY on a real `v*` tag push; a workflow_dispatch dry-run stops here.
    if: ${{ github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v') }}
    runs-on: ubuntu-latest
    permissions:
      contents: read   # checkout
      id-token: write  # OIDC exchange for a short-lived crates.io token
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Authenticate to crates.io (Trusted Publishing)
        id: auth
        uses: rust-lang/crates-io-auth-action@v1

      - name: Publish in dependency order
        run: |
          set -euo pipefail
          # The version being published is the workspace.package version (root
          # Cargo.toml). `-m1` grabs that first `^version = ` line, not the
          # indented internal-dependency `version = "..."` entries below it.
          VERSION="$(grep -m1 '^version = ' Cargo.toml | sed -E 's/.*"([^"]+)".*/\1/')"
          echo "publishing workspace version ${VERSION}"
          # This loop is IDEMPOTENT: before each `cargo publish` it queries the
          # crates.io sparse index and SKIPS any crate@version already published,
          # so a partial release (e.g. one crate up, others 403'd) re-runs safely
          # instead of dying on the already-published crate under `pipefail`.
          #
          # NOTE: Trusted Publishing is registered on crates.io for the five
          # previously-published crates (snapdir-core/-catalog/-stores/
          # -ssh-store/-cli). *** `snapdir` is NEW at 1.6.0 — its FIRST publish
          # will 403 under TP (TP tokens cannot create new crates); see the
          # RELEASE-TIME OPERATOR TODO in the job header above: one manual
          # `cargo publish -p snapdir`, re-run this job (the skip-guard makes
          # the re-run safe), then register TP on the crate page. ***
          #
          # Ordering: snapdir-ssh-store's only runtime dep is snapdir-core, but
          # its dev-dep on snapdir-stores is recorded (with this version) in the
          # index metadata, so it publishes AFTER snapdir-stores. snapdir-cli
          # (the implementation library) consumes everything before it, and the
          # `snapdir` bin shim depends on snapdir-cli — so `snapdir` goes LAST.
          for crate in snapdir-core snapdir-catalog snapdir-stores snapdir-ssh-store snapdir-cli snapdir; do
            echo "::group::publish ${crate}"
            # Sparse-index shard for a crate name >= 4 chars: <c1c2>/<c3c4>/<name>.
            # All six snapdir crate names are >= 4 chars, so this is uniform.
            shard="$(printf %s "${crate}" | cut -c1-2)/$(printf %s "${crate}" | cut -c3-4)"
            # `curl -sf` returns non-zero for a never-published crate (index 404);
            # running it inside the `if` condition means that failure does NOT trip
            # `set -e`, and `grep -q` over empty input is false -> we fall through
            # and publish. Only an actual matching `"vers":"${VERSION}"` line skips.
            if curl -sf "https://index.crates.io/${shard}/${crate}" | grep -q "\"vers\":\"${VERSION}\""; then
              echo "${crate} ${VERSION} already published; skipping"
              echo "::endgroup::"
              continue
            fi
            cargo publish --locked -p "${crate}" --no-verify
            echo "::endgroup::"
          done
        env:
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}
