name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"
  RUST_BACKTRACE: "1"
  # Workspace standardizes on the ring rustls provider; never aws-lc-rs.
  # (Enforced structurally in deny.toml bans + crate features.)

jobs:
  # --------------------------------------------------------------------------
  # Lint: formatting, clippy (deny warnings), typos, actionlint, unused deps,
  # and public-API semver checks on the frozen core crate.
  # --------------------------------------------------------------------------
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: rustfmt (check)
        run: cargo fmt --all --check

      - name: clippy (deny warnings)
        run: cargo clippy --workspace --all-targets --all-features --locked -- -D warnings

      - name: Install typos
        uses: taiki-e/install-action@v2
        with:
          tool: typos-cli

      - name: typos
        run: typos

      - name: Install actionlint
        run: |
          VER=1.7.12
          curl -sSL "https://github.com/rhysd/actionlint/releases/download/v${VER}/actionlint_${VER}_linux_amd64.tar.gz" | tar -xz actionlint
          sudo mv actionlint /usr/local/bin/actionlint
          actionlint --version

      - name: actionlint
        run: actionlint -color

      - name: Install cargo-shear
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-shear

      - name: cargo-shear (unused deps)
        run: cargo shear

      - name: Install cargo-semver-checks
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-semver-checks

      - name: cargo-semver-checks (snapdir-core)
        run: cargo semver-checks check-release --package snapdir-core || true

  # --------------------------------------------------------------------------
  # Supply-chain: advisories, license/ban policy, source allowlist, audit.
  # --------------------------------------------------------------------------
  deny:
    name: Supply chain
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-deny
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny

      - name: cargo-deny
        run: cargo deny --workspace --all-features check

      - name: Install cargo-audit
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit

      - name: cargo-audit
        run: cargo audit

  # --------------------------------------------------------------------------
  # Test matrix: {MSRV, stable, beta} x {ubuntu, macos}.
  # MSRV is read from the workspace rust-version; keep it in sync with Cargo.toml.
  # --------------------------------------------------------------------------
  test:
    name: Test (${{ matrix.rust }} / ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        rust: ["1.91.1", stable, beta]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain (${{ matrix.rust }})
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.rust }}

      - name: Build (workspace, locked)
        run: cargo build --workspace --all-features --locked

      - name: Test (workspace, locked)
        run: cargo test --workspace --all-features --locked

      # Compile-only gate so the criterion + iai-callgrind benches can't
      # bit-rot. The real valgrind instruction-count run lives in the
      # `bench-iai` job; here we only prove every workspace bench still builds.
      - name: Bench compile check (cargo bench --no-run)
        run: cargo bench --workspace --no-run --locked

  # --------------------------------------------------------------------------
  # Bench (iai-callgrind): deterministic CPU instruction-count perf gate.
  # Runs the real valgrind/callgrind measurement on a native Linux runner using
  # the SAME toolchain + iai-callgrind-runner pins as benches/run-iai-docker.sh
  # (image rust:1.91 -> toolchain 1.91.1; runner =0.16.1) so the counts match an
  # operator's macOS-Docker run. The 5% Ir/EstimatedCycles soft-limit regression
  # configured in benches/benches/iai_hot.rs fails the job on a regression.
  # --------------------------------------------------------------------------
  bench-iai:
    name: Bench (iai-callgrind)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Pin the toolchain to 1.91.1 (matching run-iai-docker.sh's rust:1.91
      # image) so instruction counts are stable across runs.
      - name: Install Rust toolchain (1.91.1)
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.91.1

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      # valgrind provides the callgrind backend iai-callgrind measures through.
      # On a native Linux runner no Docker is needed (unlike the macOS path).
      - name: Install valgrind
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends valgrind

      # The runner version MUST match the `iai-callgrind = "=0.16.1"` dev-dep in
      # benches/Cargo.toml (see run-iai-docker.sh) or the runner refuses to run.
      - name: Install iai-callgrind-runner (0.16.1)
        run: cargo install iai-callgrind-runner --version 0.16.1 --locked

      # The real valgrind run; iai_hot.rs enforces the 5% soft-limit regression.
      - name: Run iai instruction-count gate
        run: cargo bench -p snapdir-benches --bench iai_hot

  # --------------------------------------------------------------------------
  # Static musl leg: the load-bearing target for distribution. Validates that
  # the ring rustls provider links cleanly in a fully static binary (no
  # aws-lc-rs). Built in both debug and release.
  # --------------------------------------------------------------------------
  musl:
    name: Static musl (${{ matrix.profile }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        profile: [debug, release]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain (musl target)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      - name: Install musl-tools
        run: |
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends musl-tools

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          key: musl-${{ matrix.profile }}

      - name: Build static musl (${{ matrix.profile }})
        run: |
          if [ "${{ matrix.profile }}" = "release" ]; then
            cargo build --workspace --all-features --locked \
              --target x86_64-unknown-linux-musl --release
          else
            cargo build --workspace --all-features --locked \
              --target x86_64-unknown-linux-musl
          fi

  # --------------------------------------------------------------------------
  # Doctests: run separately so they are never silently skipped.
  # --------------------------------------------------------------------------
  doctests:
    name: Doctests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: cargo test --doc
        run: cargo test --workspace --all-features --locked --doc

  # --------------------------------------------------------------------------
  # Coverage: cargo-llvm-cov -> Codecov, with a fail-under floor.
  # Threshold changes require a PM proposal + human approval.
  # --------------------------------------------------------------------------
  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov

      - name: Generate coverage (lcov + fail-under)
        run: |
          cargo llvm-cov --workspace --all-features --locked \
            --fail-under-lines 75 \
            --lcov --output-path lcov.info

      - name: Upload to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: lcov.info
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
