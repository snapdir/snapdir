name: CI

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main, dev]

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"
  RUST_BACKTRACE: "1"
  # Workspace standardizes on the ring rustls provider; never aws-lc-rs.
  # (Enforced structurally in deny.toml bans + crate features.)

jobs:
  # --------------------------------------------------------------------------
  # Lint: formatting, clippy (deny warnings), typos, actionlint, unused deps,
  # and public-API semver checks on the frozen core crate.
  # --------------------------------------------------------------------------
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: rustfmt (check)
        run: cargo fmt --all --check

      - name: clippy (deny warnings)
        run: cargo clippy --workspace --exclude snapdir-node --exclude snapdir-python --all-targets --all-features --locked -- -D warnings

      - name: Install typos
        uses: taiki-e/install-action@v2
        with:
          tool: typos-cli

      - name: typos
        run: typos

      - name: Install actionlint
        run: |
          VER=1.7.12
          case "$(uname -m)" in
            x86_64)           ARCH=amd64 ;;
            aarch64|arm64)    ARCH=arm64 ;;
            *)                echo "Unsupported arch: $(uname -m)" && exit 1 ;;
          esac
          curl -sSL "https://github.com/rhysd/actionlint/releases/download/v${VER}/actionlint_${VER}_linux_${ARCH}.tar.gz" | tar -xz actionlint
          if command -v sudo >/dev/null 2>&1; then
            sudo mv actionlint /usr/local/bin/actionlint
          else
            mv actionlint /usr/local/bin/actionlint
          fi
          actionlint --version

      - name: actionlint
        run: actionlint -color

      - name: Install cargo-shear
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-shear

      - name: cargo-shear (unused deps)
        run: cargo shear

      - name: Install cargo-semver-checks
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-semver-checks

      - name: cargo-semver-checks (snapdir-core)
        run: cargo semver-checks check-release --package snapdir-core || true

  # --------------------------------------------------------------------------
  # Supply-chain: advisories, license/ban policy, source allowlist, audit.
  # --------------------------------------------------------------------------
  deny:
    name: Supply chain
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-deny
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-deny

      - name: cargo-deny
        run: cargo deny --workspace --all-features check

      - name: Install cargo-audit
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit

      # ignores mirror deny.toml's [advisories] ignore (cargo-audit doesn't read deny.toml); see deny.toml for per-ID rationale.
      - name: cargo-audit
        run: cargo audit --ignore RUSTSEC-2025-0020 --ignore RUSTSEC-2026-0177 --ignore RUSTSEC-2026-0190 --ignore RUSTSEC-2026-0173 --ignore RUSTSEC-2025-0141

  # --------------------------------------------------------------------------
  # Test matrix: {MSRV, stable, beta} x {ubuntu, macos}.
  # MSRV is read from the workspace rust-version; keep it in sync with Cargo.toml.
  # --------------------------------------------------------------------------
  test:
    name: Test (${{ matrix.rust }} / ${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
        rust: ["1.91.1", stable, beta]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain (${{ matrix.rust }})
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: ${{ matrix.rust }}

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.rust }}

      # The snapdir-ssh-store loopback suite (tests/loopback_sshd.rs) spawns a
      # REAL sshd. macOS runners ship /usr/sbin/sshd; ubuntu images only have
      # the ssh client, so install the server.
      - name: Install openssh-server (loopback sshd suite)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends openssh-server

      - name: Build (workspace, locked)
        run: cargo build --workspace --exclude snapdir-node --exclude snapdir-python --all-features --locked

      - name: Test (workspace, locked)
        run: cargo test --workspace --exclude snapdir-node --exclude snapdir-python --all-features --locked
        env:
          # Forbid the loopback sshd suite's environmental eprintln-skip so the
          # T2 gate can't rot into all-skips on CI (sshd is guaranteed above).
          SNAPDIR_SSH_TEST_REQUIRE: "1"

      # Compile-only gate so the criterion + iai-callgrind benches can't
      # bit-rot. The real valgrind instruction-count run lives in the
      # `bench-iai` job; here we only prove every workspace bench still builds.
      - name: Bench compile check (cargo bench --no-run)
        run: cargo bench --workspace --exclude snapdir-node --exclude snapdir-python --no-run --locked

  # --------------------------------------------------------------------------
  # Reflink (Linux FICLONE / copy-on-write): exercise the REAL clone fast-path.
  # The standard ubuntu-latest runner is ext4, where FICLONE never fires (only
  # the fs::copy fallback), so the `test` matrix above covers only the Linux
  # FALLBACK path; APFS clonefile is covered by the macos-latest matrix leg.
  # This job mounts a loopback Btrfs image (a reflink-capable FS) on the
  # standard runner — no special/self-hosted runner — so the FICLONE ioctl
  # genuinely fires and the reflink/clone-skip suites assert clonefile_hits()
  # actually advanced. Mirrors the loopback-sshd sudo-env precedent in `test`.
  #
  # REQUIRED job (no continue-on-error): if the loopback mount ever proves
  # flaky on the hosted runner, the documented fallback is to add
  # `continue-on-error: true` here (a 1.7.x hardening step) — but ship it
  # required so a broken FICLONE path can't merge silently.
  # --------------------------------------------------------------------------
  reflink:
    name: Reflink (Btrfs FICLONE)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          key: reflink

      # A loopback Btrfs image gives us a real reflink-capable filesystem on the
      # stock ubuntu-latest runner (its root FS is ext4 → FICLONE never fires).
      # chmod 1777 lets the unprivileged runner user create the src+store dirs
      # the tests place under SNAPDIR_REFLINK_TEST_DIR / TMPDIR.
      - name: Set up Btrfs loopback for reflink tests
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends btrfs-progs
          truncate -s 2G /tmp/reflink.img
          mkfs.btrfs -q /tmp/reflink.img
          sudo mkdir -p /mnt/reflink
          sudo mount -o loop /tmp/reflink.img /mnt/reflink
          sudo chmod 1777 /mnt/reflink        # unprivileged runner user must create dirs

      # reflink.rs is env-gated on SNAPDIR_REFLINK_TEST_DIR (+ _REQUIRE=1 makes a
      # missing dir a hard panic, so this required leg can't rot into a silent
      # skip). clone_skip / clone_skip_race use std::env::temp_dir(), so pointing
      # TMPDIR at the Btrfs mount runs the StatGuarded skip + TOCTOU/race suites
      # against REAL reflink for free.
      - name: Reflink tests on Btrfs
        run: cargo test -p snapdir-stores --test reflink --test clone_skip --test clone_skip_race --locked
        env:
          SNAPDIR_REFLINK_TEST_DIR: /mnt/reflink
          TMPDIR: /mnt/reflink
          SNAPDIR_REFLINK_TEST_REQUIRE: "1"

  # --------------------------------------------------------------------------
  # Bench (iai-callgrind): deterministic CPU instruction-count perf gate.
  # Runs the real valgrind/callgrind measurement on a native Linux runner using
  # the SAME toolchain + iai-callgrind-runner pins as benches/run-iai-docker.sh
  # (image rust:1.91 -> toolchain 1.91.1; runner =0.16.1) so the counts match an
  # operator's macOS-Docker run. The 5% Ir/EstimatedCycles soft-limit regression
  # configured in benches/benches/iai_hot.rs fails the job on a regression.
  # --------------------------------------------------------------------------
  bench-iai:
    name: Bench (iai-callgrind)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # Pin the toolchain to 1.91.1 (matching run-iai-docker.sh's rust:1.91
      # image) so instruction counts are stable across runs.
      - name: Install Rust toolchain (1.91.1)
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.91.1

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      # valgrind provides the callgrind backend iai-callgrind measures through.
      # On a native Linux runner no Docker is needed (unlike the macOS path).
      - name: Install valgrind
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends valgrind

      # The runner version MUST match the `iai-callgrind = "=0.16.1"` dev-dep in
      # benches/Cargo.toml (see run-iai-docker.sh) or the runner refuses to run.
      - name: Install iai-callgrind-runner (0.16.1)
        run: cargo install iai-callgrind-runner --version 0.16.1 --locked

      # The real valgrind run; iai_hot.rs enforces the 5% soft-limit regression.
      - name: Run iai instruction-count gate
        run: cargo bench -p snapdir-benches --bench iai_hot

  # --------------------------------------------------------------------------
  # Static musl leg: the load-bearing target for distribution. Validates that
  # the ring rustls provider links cleanly in a fully static binary (no
  # aws-lc-rs). Built in both debug and release.
  # --------------------------------------------------------------------------
  musl:
    name: Static musl (${{ matrix.profile }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        profile: [debug, release]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain (musl target)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-musl

      - name: Install musl-tools
        run: |
          sudo apt-get update
          sudo apt-get install --yes --no-install-recommends musl-tools

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          key: musl-${{ matrix.profile }}

      - name: Build static musl (${{ matrix.profile }})
        run: |
          if [ "${{ matrix.profile }}" = "release" ]; then
            cargo build -p snapdir --all-features --locked --target x86_64-unknown-linux-musl --release
          else
            cargo build -p snapdir --all-features --locked --target x86_64-unknown-linux-musl
          fi

  # --------------------------------------------------------------------------
  # MSRV: prove snapdir-api (and the full workspace) builds at the pinned
  # minimum supported Rust version (1.91.1, from [workspace.package].rust-version).
  # This is a focused build gate — the test matrix already covers MSRV in its
  # {1.91.1, stable, beta} leg, but that leg runs all-features tests which can
  # mask a pure compilation failure in a single crate.  This job is a fast,
  # explicit signal that the snapdir-api facade crate stays inside the guarantee.
  # --------------------------------------------------------------------------
  msrv:
    name: MSRV (1.91.1)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain (1.91.1)
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: 1.91.1

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          key: msrv

      - name: Build snapdir-api at MSRV (locked)
        run: cargo +1.91.1 build -p snapdir-api --locked

      - name: Build workspace at MSRV (locked)
        run: cargo +1.91.1 build --workspace --exclude snapdir-node --exclude snapdir-python --locked

  # --------------------------------------------------------------------------
  # Doctests: run separately so they are never silently skipped.
  # --------------------------------------------------------------------------
  doctests:
    name: Doctests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: cargo test --doc
        run: cargo test --workspace --exclude snapdir-node --exclude snapdir-python --all-features --locked --doc

  # --------------------------------------------------------------------------
  # Coverage: cargo-llvm-cov -> Codecov, with a fail-under floor.
  # Threshold changes require a PM proposal + human approval.
  # --------------------------------------------------------------------------
  coverage:
    name: Coverage
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: llvm-tools-preview

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Install cargo-llvm-cov
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-llvm-cov

      # cargo llvm-cov RUNS the workspace tests, including the snapdir-ssh-store
      # loopback sshd suite — install the server so it exercises (and covers)
      # the real-sshd paths instead of eprintln-skipping.
      - name: Install openssh-server (loopback sshd suite)
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends openssh-server

      - name: Generate coverage (lcov + fail-under)
        run: |
          cargo llvm-cov --workspace --exclude snapdir-node --exclude snapdir-python --all-features --locked \
            --fail-under-lines 75 \
            --lcov --output-path lcov.info
        env:
          # Same no-skip guarantee as the test matrix (sshd installed above).
          SNAPDIR_SSH_TEST_REQUIRE: "1"

      - name: Upload to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: lcov.info
          fail_ci_if_error: false
        env:
          CODECOV_TOKEN: ${{ secrets.CODECOV_TOKEN }}
