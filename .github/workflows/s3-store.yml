name: S3
on:
  schedule:
    # Once a month to ensure the S3 backend keeps working against a
    # fresh S3-compatible emulator.
    - cron: "1 0 * * 1"
  # Only when pushing to main branch
  push:
    tags-ignore:
      - '**'
    branches:
      - main

defaults:
  run:
    shell: bash

jobs:
  # In-process Rust S3 backend (crates/snapdir-stores) round-tripped against a
  # SeaweedFS S3-compatible emulator. The live test in `snapdir-stores` is gated
  # behind SNAPDIR_S3_TEST_ENDPOINT + SNAPDIR_S3_TEST_STORE, so it only runs here
  # where the emulator is stood up.
  seaweedfs:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    env:
      AWS_ACCESS_KEY_ID: none
      AWS_SECRET_ACCESS_KEY: none
      AWS_REGION: us-east-1
      SNAPDIR_S3_TEST_ENDPOINT: http://localhost:8333
      SNAPDIR_S3_TEST_STORE: s3://snapdir-ci-bucket
    steps:
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y wget curl unzip
          wget -qO- https://github.com/chrislusf/seaweedfs/releases/download/3.09/linux_amd64.tar.gz | sudo tar xvz -C /usr/local/bin
      - name: Check out the repo
        uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2
      - name: Start SeaweedFS S3 emulator + create bucket
        run: |
          echo "# [setup] Starting seaweedfs"
          mkdir ~/seaweed-test-data
          # redirect both stdout and stderr to a file
          weed server -dir=~/seaweed-test-data -s3 > ~/seaweed.log 2>&1 &
          tail -f ~/seaweed.log | sed -E 's/^/# [seaweed] /' 1>&2 &
          TAIL_PID=$!

          echo "# [setup] Creating test bucket"
          # run command until it succeeds
          while ! aws --endpoint-url http://localhost:8333 s3 mb s3://snapdir-ci-bucket 2>/dev/null; do
            echo "# [setup] Waiting for seaweedfs to start" >&2
            sleep 1
          done

          kill "$TAIL_PID"
      - name: S3 integration test (snapdir-stores, live round-trip)
        run: |
          cargo test --locked -p snapdir-stores --all-features s3_store_live_round_trip_when_configured -- --nocapture
