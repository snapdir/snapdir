name: B2
on:
  schedule:
    # Once a month to ensure the B2 backend keeps working against Backblaze.
    - cron: "2 0 * * 1"
  # Only when pushing to main branch
  push:
    tags-ignore:
      - '**'
    branches:
      - main

defaults:
  run:
    shell: bash

# In-process Rust B2 backend (crates/snapdir-stores) round-tripped against a
# real Backblaze B2 bucket. The live test in `snapdir-stores` is gated behind
# SNAPDIR_B2_TEST_ENDPOINT + SNAPDIR_B2_TEST_STORE; the B2 application key
# id/secret are supplied as the AWS access-key/secret-key the SDK expects.
env:
  AWS_ACCESS_KEY_ID: ${{ secrets.SNAPDIR_B2_STORE_APPLICATION_KEY_ID }}
  AWS_SECRET_ACCESS_KEY: ${{ secrets.SNAPDIR_B2_STORE_APPLICATION_KEY }}
  SNAPDIR_B2_TEST_ENDPOINT: ${{ secrets.SNAPDIR_B2_TEST_ENDPOINT }}
  SNAPDIR_B2_TEST_STORE: b2://bermilabs-test-bucket

jobs:
  b2:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Check out the repo
        uses: actions/checkout@v4
      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2
      - name: B2 integration test (snapdir-stores, live round-trip)
        run: |
          cargo test --locked -p snapdir-stores --all-features b2_store_live_round_trip_when_configured -- --nocapture
