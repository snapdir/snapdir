name: Go

# Build and test the snapdir Go binding (CGo over the frozen C ABI), run vet +
# staticcheck + -race tests, and validate manifest-parity (45 PASS / 0 FAIL / 3 SKIP).
#
# Verification substrate: snapdir-bindings:dev (arm64, non-root uid 1000). Everything is
# baked into the image (rust 1.91.1, gcc, go 1.22+). NO apt, NO toolchain-install steps,
# NO network required. CGo cross-targets arm64 via GOARCH=arm64 CC=gcc.
# staticcheck is best-effort (not baked in image; deferred to credited CI — see step 4).
#
# DEFERRED legs (clearly scoped — do NOT implement until credits restored):
#   - Per-GOOS/GOARCH prebuilt lib distribution (linux/darwin/windows × amd64/arm64)
#     (act is linux/arm64-only; cross-OS legs cannot run under the local act harness)
# Both are intentionally absent so `act` remains green.

on:
  push:
    branches: [main, dev]
    paths:
      - "bindings/go/**"
      - "tests/golden/**"
      - "include/snapdir.h"
      - "crates/snapdir-ffi/**"
      - ".github/workflows/go.yml"
  pull_request:
    branches: [main, dev]
    paths:
      - "bindings/go/**"
      - "tests/golden/**"
      - "include/snapdir.h"
      - "crates/snapdir-ffi/**"
      - ".github/workflows/go.yml"

concurrency:
  group: go-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: "0"
  RUST_BACKTRACE: "1"

jobs:
  # --------------------------------------------------------------------------
  # go: build snapdir-ffi, vendor artifacts, run vet + staticcheck + race tests
  # (CGo cross-targeting arm64), and manifest parity (45/0/3).
  #
  # Runs inside the baked snapdir-bindings:dev image (arm64, non-root uid 1000,
  # rust 1.91.1, gcc, go 1.22). NO apt, NO dtolnay/rust-toolchain.
  # CGo env: CGO_ENABLED=1 GOARCH=arm64 CC=gcc GOFLAGS=-buildvcs=false
  # --------------------------------------------------------------------------
  go:
    name: Go (CGo + vet/staticcheck + test -race + parity)
    runs-on: ubuntu-latest

    env:
      CGO_ENABLED: "1"
      CC: gcc
      GOFLAGS: -buildvcs=false

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # ------------------------------------------------------------------
      # actions/setup-go@v5 ensures a consistent Go toolchain is on PATH on
      # real ubuntu-latest GH runners; under act the image already has go 1.22+
      # baked in, so this step is a low-cost pass-through there.
      # ------------------------------------------------------------------
      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: stable

      # ------------------------------------------------------------------
      # Step 1: Build FFI staticlib (release — the Go binding links .a)
      # ------------------------------------------------------------------
      - name: Build snapdir-ffi (release staticlib)
        run: cargo build --release -p snapdir-ffi --locked

      # ------------------------------------------------------------------
      # Step 2: Vendor the .a and header into bindings/go/{lib,include}
      # ------------------------------------------------------------------
      - name: Vendor libsnapdir_ffi.a + snapdir.h into bindings/go
        run: |
          mkdir -p bindings/go/lib bindings/go/include
          cp -f include/snapdir.h bindings/go/include/
          cp -f target/release/libsnapdir_ffi.a bindings/go/lib/
          echo "vendor: OK (libsnapdir_ffi.a + snapdir.h)"

      # ------------------------------------------------------------------
      # Step 3: C ABI lockstep — verify the vendored header matches the
      # canonical include/snapdir.h. The sha.lock is a dev-only artifact
      # (stripped from main); the header diff is the public-CI equivalent
      # tripwire.
      # ------------------------------------------------------------------
      - name: C ABI lockstep (header diff)
        run: |
          diff bindings/go/include/snapdir.h include/snapdir.h
          echo "cabi-lockstep: OK"

      # ------------------------------------------------------------------
      # Step 4: vet + staticcheck + race tests (mirrors go-quality EXACTLY).
      # staticcheck is not baked into the image. `go install staticcheck@latest`
      # triggers a go1.25+ toolchain download (linux/amd64) that faults on this
      # arm64 container with SIGILL / OOM — so staticcheck is best-effort under
      # act. vet and -race are strictly required; staticcheck is a warning-only
      # fallback here. Credited release CI (linux/amd64 GitHub runner) will run
      # staticcheck strict without this constraint.
      # ------------------------------------------------------------------
      - name: Vet + staticcheck + race tests
        run: |
          SC="$(go env GOPATH)/bin/staticcheck"
          cd bindings/go
          go vet ./...
          if [ -x "$SC" ]; then
            "$SC" ./...
          else
            echo "::warning::staticcheck unavailable in this arm64 act environment — deferred to credited CI"
          fi
          go test -race ./...

      # ------------------------------------------------------------------
      # Step 5: Parity (45/0/3) — build the Go driver binary then run the
      # harness. A 3× settle/retry loop guards against the virtiofs flake
      # seen in earlier gate runs.
      # ------------------------------------------------------------------
      - name: Parity — build go-driver-bin
        run: |
          cd bindings/go && go build -o "$GITHUB_WORKSPACE/tests/golden/drivers/go-driver-bin" \
            ./cmd/parity-driver
          echo "driver build: OK"

      - name: Parity — run harness (45/0/3, 3× retry for virtiofs flake)
        run: |
          chmod -R u+rwx tests/golden/work 2>/dev/null || true
          rm -rf tests/golden/work 2>/dev/null || true
          for attempt in 1 2 3; do
            if tests/golden/run_parity.sh --driver tests/golden/drivers/go.sh; then
              echo "parity: OK (attempt ${attempt})"
              exit 0
            fi
            echo "parity attempt ${attempt} failed; retrying..." >&2
            chmod -R u+rwx tests/golden/work 2>/dev/null || true
            rm -rf tests/golden/work 2>/dev/null || true
          done
          echo "parity: FAILED after 3 attempts" >&2
          exit 1

  # DEFERRED (not implemented here): per-GOOS/GOARCH prebuilt .a/.so/.dylib/.dll
  # distribution + cross-OS legs. Re-implement in credited release CI when
  # cross-compilation / OS matrix runners are available.
