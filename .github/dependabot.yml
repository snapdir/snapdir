# Dependabot v2 configuration.
#
# Supply-chain hardening: a 3-day cooldown on every ecosystem so we never adopt
# a dependency version that has been public for <3 days. A freshly-published
# malicious or compromised release is usually caught and yanked within that
# window; pairing this bot cooldown with utils/ci/check-crate-age.sh (which
# enforces the same floor against crates.io `created_at`) gives us defense in
# depth on the dependency update path.
version: 2
updates:
  # Rust / Cargo (workspace root).
  - package-ecosystem: "cargo"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    cooldown:
      default-days: 3
      semver-major-days: 3
      semver-minor-days: 3
      semver-patch-days: 3
    groups:
      cargo-minor-and-patch:
        update-types:
          - "minor"
          - "patch"

  # GitHub Actions used by our workflows.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    cooldown:
      default-days: 3
      semver-major-days: 3
      semver-minor-days: 3
      semver-patch-days: 3
    groups:
      actions-minor-and-patch:
        update-types:
          - "minor"
          - "patch"
