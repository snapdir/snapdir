# cargo-dist (modern `dist`) configuration for the snapdir Rust port.
#
# This is the canonical release-engineering config: `dist plan` / `dist build`
# read it to produce per-target archives, installers, checksums, and the
# GitHub-release upload manifest. The release workflow
# (`.github/workflows/release.yml`) drives it on `v*` tags.
#
# Lane note (packaging): this file is the load-bearing artifact for the
# `release-config` gate. The actual binary lives in `crates/snapdir-cli`
# (bin name `snapdir`). Library crates (core/catalog/stores) are published to
# crates.io by the workflow, NOT shipped as binaries here.
#
# NB: `dist` reads `[workspace]` from this file so the tool can run with
# `--workspace packaging/dist-workspace.toml` while the real Cargo workspace
# stays at the repo root (which the packaging lane must not edit).
[workspace]
members = ["cargo:../"]

[dist]
# Pin the dist version the CI installer fetches so releases are reproducible.
cargo-dist-version = "0.28.0"

# Publish/announce only the `snapdir` binary from snapdir-cli. The library
# crates are released to crates.io separately (see release.yml `crates-io`).
dist = false

# Hosting + release driver.
ci = "github"
hosting = ["github"]

# Installers: shell (curl|sh) for Unix. (snapdir is unix-only.)
installers = ["shell"]

# Per-target distribution matrix. musl is built **static** (see the
# target-specific config block + Cargo `target.*` rustflags conventions); it is
# the canary target — if anything pulls in aws-lc-rs the static link breaks, in
# which case flag it to ci/stores (ring provider) rather than patching here.
targets = [
    "x86_64-unknown-linux-gnu",
    "x86_64-unknown-linux-musl",
    "aarch64-unknown-linux-gnu",
    "aarch64-unknown-linux-musl",
    "x86_64-apple-darwin",
    "aarch64-apple-darwin",
]

# Archive format: .tar.xz for all (unix-only) targets.
unix-archive = ".tar.xz"

# Cross-compile the non-native Linux targets via a pinned `cross` image so the
# musl-static and aarch64 legs build hermetically.
cargo-dist-cross = true

# Use the dedicated, heavily-optimized release profile (LTO + strip, defined in
# this file's `[profile.dist]`) instead of the default `release` profile.
cargo-build-profile = "dist"

# Files bundled into EVERY per-target archive alongside the `snapdir` binary.
# Completions + man page are generated at build time (see release.yml
# `gen-assets` job) into ./assets and ./assets/man before the archive is cut.
# NOTE: paths are resolved relative to the workspace root (the repo root).
include = [
    "README.md",
    "LICENSE",
    "docs/rust-port/CHANGELOG.md",
    "docs/rust-port/migration.md",
    # Generated shell completions (bash/fish/zsh/powershell).
    "assets/completions/",
    # Generated man page (clap_mangen).
    "assets/man/snapdir.1",
]

# Generate a CHANGELOG/release-notes body from the bundled changelog.
auto-includes = false

# Checksums attached next to each archive on the GitHub release.
checksum = "sha256"

# Publish crates.io out-of-band in release.yml rather than via dist's
# experimental publishers (kept explicit + auditable).
publish-jobs = []

# Run our extra release jobs (asset generation, crates.io) as part of the
# dist-generated CI graph. These map to top-level jobs in release.yml.
[dist.github-custom-runners]
x86_64-unknown-linux-gnu = "ubuntu-latest"
x86_64-unknown-linux-musl = "ubuntu-latest"
aarch64-unknown-linux-gnu = "ubuntu-latest"
aarch64-unknown-linux-musl = "ubuntu-latest"
x86_64-apple-darwin = "macos-15-intel"
aarch64-apple-darwin = "macos-14"

# Heavily-optimized release profile used for shipped binaries.
# (cargo-dist reads `[profile.dist]` from the build root; mirrored here for the
# documented intent — the effective profile is in the root Cargo.toml, owned by
# the ci lane. If absent there, dist falls back to inheriting `release`.)
[profile.dist]
inherits = "release"
lto = "fat"
codegen-units = 1
opt-level = 3
panic = "abort"
strip = true
