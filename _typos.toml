# typos (crate-misspell linter) configuration.
# Run with: typos
# Docs: https://github.com/crate-ci/typos

[files]
# Generated/vendored or binary-ish paths that should not be spell-checked.
extend-exclude = [
    "Cargo.lock",
    "*.snap",
    "utils/qa-fixtures/**",
]

[default]
# Don't flag identifiers inside file paths/URLs etc. as misspellings.
locale = "en"

[default.extend-words]
# Project/term allowlist (these are intentional, not typos):
# "snapdir" is the project name.
snapdir = "snapdir"
# blake3 hashing terminology.
blake = "blake"
# Short hex digest fragments from the FROZEN golden content-addresses
# (e.g. `8af03a1b…ba82b9be`, `8aed4caf…`). These are checksum data, not prose —
# they must never be "corrected".
ba = "ba"
caf = "caf"
# `_snapdir_file_store_persit` is the VERBATIM (misspelled) function name from the
# now-deleted Bash oracle `snapdir-file-store`; the doc-comments quote it exactly.
persit = "persit"
# `anc` / `anc_lines` / `oracle_anc` are local variable identifiers (short for
# "ancestor(s)") used across the catalog tests.
anc = "anc"
# AIMD = Additive Increase Multiplicative Decrease (TCP-style congestion control);
# the Phase-18 adaptive tuner's algorithm — intentional, not "aimed".
aimd = "aimd"
# `fo` = from-objects, a temp-dir-name abbreviation in the sync-split CLI tests
# (e.g. `temp_dir("fo-src")`); these are deliberate string literals, not "of"/"for".
fo = "fo"
# `mis` = the English prefix in "mis-addressed" — the clone-skip safety invariant
# ("never a silently mis-addressed object") spelled with a hyphen across the
# copy-guard / clone-skip test prose. Intentional prefix, not "miss"/"mist".
mis = "mis"
# `deprecat` = a deliberate SUBSTRING in a dx_defaults test (`low.contains("deprecat")`)
# that matches "deprecated"/"deprecation" when checking the defaults legacy-label text.
deprecat = "deprecat"
# `unparseable` = a valid English spelling used in a dx_errors assertion message
# ("an unparseable --limit-rate must fail"); not a typo (variant of "unparsable").
unparseable = "unparseable"
# `disabl` = a deliberate SUBSTRING in the catalog_default tests (`.contains("disabl")`)
# that case-insensitively matches the "catalog disabled (--catalog none)" message text.
disabl = "disabl"

[default.extend-identifiers]
# crate / API identifiers that look like typos but are intentional.
# `CHECKs` = the SQL `CHECK` constraint keyword pluralized in a prose comment.
CHECKs = "CHECKs"
